<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ak?ll? Arka Plan Silici (Flood Fill)</title>
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1a1a1e;
            --accent: #6200ee;
            --text: #e1e1e6;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            text-align: center;
        }
        .control-group {
            margin: 15px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        input[type="file"] {
            display: none;
        }
        .btn {
            background: var(--accent);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            border: none;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.9; }
        .slider-container {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 300px;
        }
        #canvasContainer {
            margin-top: 20px;
            max-width: 100%;
            overflow: auto;
            border: 2px dashed #333;
            border-radius: 8px;
            background-image: linear-gradient(45deg, #222 25%, transparent 25%), 
                              linear-gradient(-45deg, #222 25%, transparent 25%), 
                              linear-gradient(45deg, transparent 75%, #222 75%), 
                              linear-gradient(-45deg, transparent 75%, #222 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0;
        }
        canvas {
            display: block;
            margin: 0 auto;
            max-width: 100%;
            cursor: crosshair;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Ak?ll? Arka Plan Silici</h2>
    <p style="font-size: 14px; color: #a8a8b2;">Sadece d??taki arka plana dokun. Logonun içindeki alanlar korunacakt?r.</p>
    
    <div class="control-group">
        <label for="imageLoader" class="btn">Görsel Seç</label>
        <input type="file" id="imageLoader" accept="image/*">
        
        <div class="slider-container">
            <label for="tolerance">Hassasiyet:</label>
            <input type="range" id="tolerance" min="0" max="100" value="20">
            <span id="toleranceVal">20</span>
        </div>
        
        <button id="downloadBtn" class="btn" style="background:#03dac6; color:#000; display:none;">PNG Olarak ?ndir</button>
    </div>

    <div id="canvasContainer">
        <canvas id="imageCanvas"></canvas>
    </div>
</div>

<script>
const imageLoader = document.getElementById('imageLoader');
const canvas = document.getElementById('imageCanvas');
const ctx = canvas.getContext('2d');
const toleranceSlider = document.getElementById('tolerance');
const toleranceVal = document.getElementById('toleranceVal');
const downloadBtn = document.getElementById('downloadBtn');

let originalImg = null;

toleranceSlider.addEventListener('input', (e) => {
    toleranceVal.textContent = e.target.value;
});

imageLoader.addEventListener('change', handleImage, false);

function handleImage(e) {
    const reader = new FileReader();
    reader.onload = function(event) {
        originalImg = new Image();
        originalImg.onload = function() {
            canvas.width = originalImg.width;
            canvas.height = originalImg.height;
            ctx.drawImage(originalImg, 0, 0);
            downloadBtn.style.display = 'inline-block';
        }
        originalImg.src = event.target.result;
    }
    reader.readAsDataURL(e.target.files[0]);
}

canvas.addEventListener('click', function(e) {
    if (!originalImg) return;

    // Her t?klamada temiz orijinal resmi baz al?yoruz
    ctx.drawImage(originalImg, 0, 0);

    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    
    const startX = Math.floor((e.clientX - rect.left) * scaleX);
    const startY = Math.floor((e.clientY - rect.top) * scaleY);

    const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const data = imgData.data;
    const width = canvas.width;
    const height = canvas.height;

    // T?klanan ba?lang?ç pikselinin rengi
    const startIdx = (startY * width + startX) * 4;
    const targetR = data[startIdx];
    const targetG = data[startIdx+1];
    const targetB = data[startIdx+2];
    const targetA = data[startIdx+3];

    // E?er zaten ?effafsa i?lem yapma
    if (targetA === 0) return;

    const tolerance = parseInt(toleranceSlider.value);
    
    // Ziyaret edilen pikselleri tutmak için typed array (Performans için)
    const visited = new Uint8Array(width * height);
    
    // BFS için kuyruk (Queue)
    const queue = [[startX, startY]];
    visited[startY * width + startX] = 1;

    while (queue.length > 0) {
        const [cx, cy] = queue.shift();
        const idx = (cy * width + cx) * 4;

        // Rengi ?effaf yap
        data[idx + 3] = 0;

        // 4 yönlü kom?u kontrolü (Sa?, Sol, A?a??, Yukar?)
        const neighbors = [
            [cx + 1, cy],
            [cx - 1, cy],
            [cx, cy + 1],
            [cx, cy - 1]
        ];

        for (const [nx, ny] of neighbors) {
            if (nx >= 0 && nx < width && ny >= 0 && ny < height) {
                const nIdx = (ny * width + nx);
                
                if (!visited[nIdx]) {
                    visited[nIdx] = 1;
                    const pDataIdx = nIdx * 4;
                    
                    const r = data[pDataIdx];
                    const g = data[pDataIdx + 1];
                    const b = data[pDataIdx + 2];
                    const a = data[pDataIdx + 3];

                    // Renk tolerans dahilinde mi ve ?effaf de?il mi kontrolü
                    if (a > 0 && 
                        Math.abs(r - targetR) <= tolerance && 
                        Math.abs(g - targetG) <= tolerance && 
                        Math.abs(b - targetB) <= tolerance) {
                        queue.push([nx, ny]);
                    }
                }
            }
        }
    }

    ctx.putImageData(imgData, 0, 0);
});

downloadBtn.addEventListener('click', () => {
    const link = document.createElement('a');
    link.download = 'akilli-temiz-logo.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
});
</script>

</body>
</html>
